apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: keda-queue-demo
  namespace: argocd
spec:
  description: KEDA queue/message-driven scaling demo
  sourceRepos:
    - https://github.com/OWNER/keda-queue-worker.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: keda-demo
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
