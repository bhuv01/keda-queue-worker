apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-queue-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: keda-queue-demo
  source:
    repoURL: https://github.com/bhuv01/keda-queue-worker.git
    targetRevision: HEAD
    path: deploy/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: keda-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # KEDA owns the worker's replica count — never let ArgoCD revert it.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: queue-worker
      jsonPointers:
        - /spec/replicas
