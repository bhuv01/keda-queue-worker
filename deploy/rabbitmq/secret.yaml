# DEMO CREDENTIALS ONLY — do not use in production.
# In a real cluster, keep secrets out of Git: use Sealed Secrets, External
# Secrets Operator, or your cloud secret manager, and have KEDA's
# TriggerAuthentication reference the synced Secret.
#
# Note (KEDA RabbitMQ scaler): when the connection string is supplied via
# TriggerAuthentication/host, the password must NOT contain URI-special
# characters — keep it simple/alphanumeric.
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: keda-demo
  labels:
    app.kubernetes.io/part-of: keda-queue-demo
type: Opaque
stringData:
  username: "app"
  password: "demopassword"
  # Used by the worker (AMQP, port 5672).
  amqp-uri: "amqp://app:demopassword@rabbitmq.keda-demo.svc.cluster.local:5672/"
  # Used by KEDA's scaler (Management HTTP API, port 15672). Using the HTTP
  # protocol lets the scaler count UNACKED (in-flight) messages too, not just
  # "ready" ones — important when consumers prefetch/hold messages.
  management-uri: "http://app:demopassword@rabbitmq.keda-demo.svc.cluster.local:15672/"
