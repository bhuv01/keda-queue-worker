apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev: small ceiling + fast cooldown so scale 0->N->0 is quick to observe.
resources:
  - ../../base
  - ../../rabbitmq
  - ../../keda

namespace: keda-demo

images:
  - name: ghcr.io/bhuv01/keda-queue-worker
    newName: ghcr.io/bhuv01/keda-queue-worker
    newTag: dev

patches:
  - path: patch-scaledobject.yaml
    target:
      group: keda.sh
      version: v1alpha1
      kind: ScaledObject
      name: queue-worker
  - path: patch-deployment.yaml
    target:
      group: apps
      version: v1
      kind: Deployment
      name: queue-worker
