apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
spec:
  template:
    spec:
      containers:
        - name: worker
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: PREFETCH
              value: "5"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
