# =============================================================================
# ALTERNATIVE (for learning): Redis List scaler
# =============================================================================
# NOT applied by the kustomizations. Same idea, different broker: scale on the
# length of a Redis list (LPUSH producers / BRPOP consumers). Swap the worker's
# client to Redis to use this; shown here to illustrate that the KEDA pattern is
# identical across messaging backends — only the trigger changes.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: queue-worker-redis
  namespace: keda-demo
spec:
  scaleTargetRef:
    name: queue-worker
  minReplicaCount: 0
  maxReplicaCount: 10
  cooldownPeriod: 60
  pollingInterval: 10
  triggers:
    - type: redis
      metadata:
        address: redis.keda-demo.svc.cluster.local:6379
        listName: tasks
        listLength: "5"             # target list items per replica
        activationListLength: "0"   # any item lifts off zero
        # For auth use a TriggerAuthentication with `password` from a Secret.
