apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: keda-demo
  labels:
    app.kubernetes.io/name: queue-worker
    app.kubernetes.io/component: consumer
    app.kubernetes.io/part-of: keda-queue-demo
spec:
  # replicas is intentionally omitted: KEDA's ScaledObject owns it (0..N), and
  # ArgoCD is configured to ignore drift on spec.replicas.
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: queue-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: queue-worker
        app.kubernetes.io/component: consumer
        app.kubernetes.io/part-of: keda-queue-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: queue-worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Give in-flight messages time to finish (or be requeued) on scale-down.
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: ghcr.io/bhuv01/keda-queue-worker:latest # overridden per overlay
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODE
              value: "worker"
            - name: QUEUE_NAME
              value: "tasks"
            - name: PREFETCH
              value: "1"
            - name: WORK_MS_MIN
              value: "250"
            - name: WORK_MS_MAX
              value: "750"
            - name: LOG_LEVEL
              value: "info"
            # AMQP connection string for the worker (5672). Comes from the Secret
            # created in deploy/rabbitmq/secret.yaml.
            - name: AMQP_URI
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: amqp-uri
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 300m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
